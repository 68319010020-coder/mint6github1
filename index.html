<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>เว็บไซต์ของฉัน</h1>
</header>

<!-- Slider -->
<section class="slider">
    <div class="slides">
        <img src="images/img1.jpg" alt="รูปที่ 1">
        <img src="images/img2.jpg" alt="รูปที่ 2">
        <img src="images/img3.jpg" alt="รูปที่ 3">
    </div>
</section>

<!-- เนื้อหาแต่ละส่วน -->
<section class="content">
    <div class="card">
        <img src="images/product1.jpg" alt="">
        <h3>สินค้า 1</h3>
        <p>รายละเอียดสินค้า</p>
    </div>

    <div class="card">
        <img src="images/product2.jpg" alt="">
        <h3>สินค้า 2</h3>
        <p>รายละเอียดสินค้า</p>
    </div>

    <div class="card">
        <img src="images/product3.jpg" alt="">
        <h3>สินค้า 3</h3>
        <p>รายละเอียดสินค้า</p>
    </div>
</section>

</body>
</html>
